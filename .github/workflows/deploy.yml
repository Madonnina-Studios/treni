name: Deploy su Altervista con Immagini e Cache Busting 🚀

on:
  push:
    branches:
      - main  # ⚠️ Sostituisci con 'master' se la tua branch principale è master

jobs:
  web-deploy:
    name: FTP Deploy
    runs-on: ubuntu-latest
    
    steps:
    # 1. Scarica il codice dal repository
    - name: Get latest code
      uses: actions/checkout@v4
    
    # 2. Applica il Cache Busting sui file principali
    - name: Apply Cache Busting
      run: |
        VERSION_TAG="v=${{ github.sha }}"
        SHORT_TAG=$(echo ${VERSION_TAG} | cut -c1-9)
        sed -i "s/mobile.css/mobile.css?$SHORT_TAG/g" index.html
        sed -i "s/desktop.css/desktop.css?$SHORT_TAG/g" index.html
        sed -i "s/engine.js/engine.js?$SHORT_TAG/g" index.html
    
    # 3. Spara TUTTO su Altervista mantenendo la struttura delle cartelle
    - name: Upload via FTP
      uses: SamKirkland/FTP-Deploy-Action@v4.3.5
      with:
        server: ${{ secrets.FTP_SERVER }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        # 🎯 FORZIAMO IL CARICAMENTO COMPLETO DELLE CARTELLE:
        server-dir: /
        local-dir: ./
        dangerous-clean-slate: false # Evita di cancellare roba a caso sul server
        exclude: |
          **/.git*
          **/.git*/**
          README.md
