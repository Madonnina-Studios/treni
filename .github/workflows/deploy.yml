name: Deploy Codice su Altervista 🚀

on:
  push:
    branches:
      - main

jobs:
  web-deploy:
    name: FTP Deploy (Solo Code)
    runs-on: ubuntu-latest
    
    steps:
    # 1. Scarica il codice
    - name: Get latest code
      uses: actions/checkout@v4
    
    # 2. Applica il Cache Busting
    - name: Apply Cache Busting
      run: |
        VERSION_TAG="v=${{ github.sha }}"
        SHORT_TAG=$(echo ${VERSION_TAG} | cut -c1-9)
        sed -i "s/mobile.css/mobile.css?$SHORT_TAG/g" index.html
        sed -i "s/desktop.css/desktop.css?$SHORT_TAG/g" index.html
        sed -i "s/engine.js/engine.js?$SHORT_TAG/g" index.html
    
    # 3. Spara i file con la Action standard configurata per Altervista
    - name: Upload via FTP
      uses: SamKirkland/FTP-Deploy-Action@v4.3.5
      with:
        server: ${{ secrets.FTP_SERVER }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        
        # PARAMETRI SALVA-VITA PER EVITARE IL BLOCCO SOCKET SU ALTERVISTA
        port: 21
        protocol: ftp
        stateful: true  # <--- Questo costringe GitHub a usare UN SOLO binario di connessione, senza sovraccaricare Altervista
        
        # Evita di toccare la cartella immagini sul server
        exclude: |
          **/immagini/**
          **/immagini
          **/.git*
          **/.git*/**
          README.md
